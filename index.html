<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simple WebXR AR Test</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    width:100%;
    height:100%;
    background:black;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
    color:white;
    font-family:sans-serif;
}

button{
    padding:10px 16px;
    font-size:16px;
}
</style>
</head>

<body>

<div id="ui">
    <button id="start">AR開始</button>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.166.1/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.166.1/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let hitTestSource = null;
let hitTestSourceRequested = false;

let reticle;
let placed = false;

init();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.01,
        1000
    );

    renderer = new THREE.WebGLRenderer({
        alpha: true,
        antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;

    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

    // レティクル（地面認識表示）
    const geo = new THREE.RingGeometry(0.15, 0.2, 32);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    reticle = new THREE.Mesh(geo, mat);
    reticle.rotation.x = -Math.PI / 2;
    reticle.visible = false;
    scene.add(reticle);

    document.getElementById("start").addEventListener("click", () => {

        document.getElementById("ui").style.display = "none";

        document.body.appendChild(
            ARButton.createButton(renderer, {
                requiredFeatures: ["hit-test"]
            })
        );
    });

    renderer.setAnimationLoop(render);
}

function placeObject(matrix) {

    const geo = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 32);

    const mat = new THREE.MeshStandardMaterial({
        color: 0x00ff00,
        transparent: true,
        opacity: 0.7
    });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.setFromMatrixPosition(matrix);

    scene.add(mesh);
}

function render(_, frame) {

    if (frame) {

        const session = renderer.xr.getSession();
        const refSpace = renderer.xr.getReferenceSpace();

        if (!hitTestSourceRequested) {

            session.requestReferenceSpace("viewer").then((space) => {

                session.requestHitTestSource({ space }).then((source) => {
                    hitTestSource = source;
                });
            });

            hitTestSourceRequested = true;
        }

        if (hitTestSource) {

            const hits = frame.getHitTestResults(hitTestSource);

            if (hits.length > 0) {

                const pose = hits[0].getPose(refSpace);

                reticle.visible = true;
                reticle.matrix.fromArray(pose.transform.matrix);
                reticle.matrix.decompose(
                    reticle.position,
                    reticle.quaternion,
                    reticle.scale
                );

                // 1回だけ配置（自動）
                if (!placed) {
                    placeObject(new THREE.Matrix4().fromArray(pose.transform.matrix));
                    placed = true;
                }

            } else {
                reticle.visible = false;
            }
        }
    }

    renderer.render(scene, camera);
}

</script>

</body>
</html>

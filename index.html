<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WebXR Check</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f0f0f0;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>WebXR AR対応チェック</h2>

<button id="check">チェック開始</button>

<div id="result">未実行</div>

<script>
async function checkXR() {
  const result = document.getElementById("result");

  if (!navigator.xr) {
    result.textContent = "WebXR自体が未対応です";
    return;
  }

  let supported = false;

  try {
    supported = await navigator.xr.isSessionSupported("immersive-ar");
  } catch (e) {
    result.textContent = "エラー: " + e;
    return;
  }

  let output = "";
  output += "immersive-ar対応: " + supported + "\n";

  if (supported) {
    output += "→ ARセッション開始可能性あり\n";
  } else {
    output += "→ この端末ではWebXR ARは不可\n";
  }

  result.textContent = output;
}

document.getElementById("check").addEventListener("click", checkXR);
</script>

</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR test</title>
</head>
<body>
<button id="enter">Enter XR</button>

<script>
const btn = document.getElementById("enter");

btn.onclick = async () => {
  if (!navigator.xr) {
    alert("WebXR非対応です");
    return;
  }

  const supported = await navigator.xr.isSessionSupported("immersive-ar");
  alert("AR対応: " + supported);
};
</script>
</body>
</html>

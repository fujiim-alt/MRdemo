<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebXR AR Demo</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
}

#startButton{
    position:absolute;
    left:50%;
    bottom:30px;
    transform:translateX(-50%);
    padding:15px 30px;
    font-size:18px;
    z-index:10;
}
</style>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.165/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let controller;
let reticle;

init();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth/window.innerHeight,
        0.01,
        20
    );

    renderer = new THREE.WebGLRenderer({
        antialias:true,
        alpha:true
    });

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.xr.enabled=true;

    document.body.appendChild(renderer.domElement);

    const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,3);
    scene.add(light);

    reticle=new THREE.Mesh(
        new THREE.RingGeometry(0.08,0.1,32).rotateX(-Math.PI/2),
        new THREE.MeshBasicMaterial()
    );

    reticle.matrixAutoUpdate=false;
    reticle.visible=false;
    scene.add(reticle);

    controller=renderer.xr.getController(0);

    controller.addEventListener("select",placeCube);

    scene.add(controller);

    const button=ARButton.createButton(renderer,{
        requiredFeatures:["hit-test"]
    });

    button.id="startButton";
    button.textContent="AR開始";

    document.body.appendChild(button);

    renderer.setAnimationLoop(render);

}

let hitTestSource=null;
let hitTestRequested=false;

function render(timestamp,frame){

    if(frame){

        const referenceSpace=renderer.xr.getReferenceSpace();
        const session=renderer.xr.getSession();

        if(!hitTestRequested){

            session.requestReferenceSpace("viewer").then((viewerSpace)=>{

                session.requestHitTestSource({
                    space:viewerSpace
                }).then((source)=>{
                    hitTestSource=source;
                });

            });

            session.addEventListener("end",()=>{

                hitTestRequested=false;
                hitTestSource=null;

            });

            hitTestRequested=true;
        }

        if(hitTestSource){

            const hits=frame.getHitTestResults(hitTestSource);

            if(hits.length){

                const hit=hits[0];
                const pose=hit.getPose(referenceSpace);

                reticle.visible=true;
                reticle.matrix.fromArray(pose.transform.matrix);

            }else{

                reticle.visible=false;

            }

        }

    }

    renderer.render(scene,camera);

}

function placeCube(){

    if(!reticle.visible) return;

    const cube=new THREE.Mesh(

        new THREE.BoxGeometry(0.1,0.1,0.1),

        new THREE.MeshStandardMaterial({
            color:0xff0000
        })

    );

    cube.position.setFromMatrixPosition(reticle.matrix);
    cube.quaternion.setFromRotationMatrix(reticle.matrix);

    scene.add(cube);

}

window.addEventListener("resize",()=>{

    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</head>
<body>
</body>
</html>

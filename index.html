<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Debug</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";

    let scene, camera, renderer;
    let reticle;

    let hitTestSource = null;
    let referenceSpace = null;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera();

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // ★重要：hit-testを必須にしない
      document.body.appendChild(
        ARButton.createButton(renderer, {
          optionalFeatures: ["hit-test"]
        })
      );

      // ★テスト用：カメラ前に必ず箱を出す（AR確認用）
      const testBox = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.1, 0.1),
        new THREE.MeshNormalMaterial()
      );
      testBox.position.set(0, 0, -0.5);
      camera.add(testBox);

      scene.add(camera);

      // reticle
      const geometry = new THREE.RingGeometry(0.07, 0.1, 32);
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      reticle = new THREE.Mesh(geometry, material);
      reticle.rotation.x = -Math.PI / 2;
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      // タップで箱追加
      renderer.domElement.addEventListener("click", () => {
        if (!reticle.visible) return;

        const box = new THREE.Mesh(
          new THREE.BoxGeometry(0.1, 0.1, 0.1),
          new THREE.MeshNormalMaterial()
        );

        box.position.setFromMatrixPosition(reticle.matrix);
        scene.add(box);
      });

      // AR開始
      renderer.xr.addEventListener("sessionstart", async () => {
        const session = renderer.xr.getSession();

        try {
          referenceSpace = await session.requestReferenceSpace("local");

          const viewerSpace = await session.requestReferenceSpace("viewer");

          hitTestSource = await session.requestHitTestSource({
            space: viewerSpace
          });

          console.log("hitTestSource:", hitTestSource);
        } catch (e) {
          console.log("hit-test failed:", e);
        }
      });

      renderer.xr.addEventListener("sessionend", () => {
        hitTestSource = null;
        referenceSpace = null;
      });
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render(time, frame) {
      if (frame && hitTestSource && referenceSpace) {
        const hits = frame.getHitTestResults(hitTestSource);

        if (hits.length > 0) {
          const pose = hits[0].getPose(referenceSpace);

          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        } else {
          reticle.visible = false;
        }
      }

      renderer.render(scene, camera);
    }
  </script>
</head>

<body></body>
</html>
